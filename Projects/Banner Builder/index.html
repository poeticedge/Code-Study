<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banner Builder</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      .banner-preview {
        border: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        background-size: cover;
        background-position: center;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container mt-4">
      <h2>Banner Builder</h2>

      <div class="mb-3">
        <label for="imageUrl" class="form-label">Banner Image URL:</label>
        <input
          type="text"
          id="imageUrl"
          class="form-control"
          placeholder="Enter image URL"
        />
      </div>

      <div class="mb-3">
        <label for="bannerSize" class="form-label">Select Banner Size:</label>
        <select id="bannerSize" class="form-select">
          <option value="712x200">List View (712x200)</option>
          <option value="702x300">Authenticated</option>
          <option value="1025x300">Full Width (1025x300)</option>
          <option value="300x300">One Third</option>
          <option value="400x100">Cart</option>
          <option value="500x500">Splash (500x500)</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="bannerHeaderText" class="form-label">Banner Header:</label>
        <input
          type="text"
          id="bannerHeaderText"
          class="form-control"
          placeholder="Enter banner header text"
        />
      </div>

      <div class="mb-3">
        <label for="headerTextSize" class="form-label">Header Text Size:</label>
        <select id="headerTextSize" class="form-select">
          <option value="3.5rem">3.5rem</option>
          <option value="3rem">3rem</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="bannerText" class="form-label">Banner SubText:</label>
        <input
          type="text"
          id="bannerText"
          class="form-control"
          placeholder="Enter banner subtext"
        />
      </div>

      <div class="mb-3">
        <label for="textSize" class="form-label">SubText Size:</label>
        <select id="textSize" class="form-select">
          <option value="1.6rem">1.6rem</option>
          <option value="20px">20px</option>
          <option value="24px">24px</option>
          <option value="28px">28px</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="textColor" class="form-label">Text Color:</label>
        <select id="textColor" class="form-select">
          <option value="black">Black</option>
          <option value="white">White</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="textAlignment" class="form-label">Text Alignment:</label>
        <select id="textAlignment" class="form-select">
          <option value="left">Left</option>
          <option value="center">Center</option>
          <option value="right">Right</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="generateBanner()">
        Generate Banner
      </button>
      <button class="btn btn-secondary" onclick="exportHTML()">
        Export HTML
      </button>

      <h3 class="mt-4">Preview</h3>
      <div
        id="bannerPreview"
        class="banner-preview mt-2"
        style="width: 300px; height: 250px"
      >
        <span
          id="previewHeader"
          style="color: black; font-size: 24px; font-weight: bold"
          >Your Header Here</span
        >
        <span id="previewText" style="color: black; font-size: 16px"
          >Your Text Here</span
        >
        <div id="previewCTA" class="mt-2">
          <button id="ctaButton" class="btn btn-primary">Shop Now</button>
        </div>
      </div>
    </div>

    <script>
      function generateBanner() {
        const imageUrl = document.getElementById("imageUrl").value;
        const bannerSize = document
          .getElementById("bannerSize")
          .value.split("x");
        const bannerHeaderText =
          document.getElementById("bannerHeaderText").value;
        const bannerText = document.getElementById("bannerText").value;
        const textColor = document.getElementById("textColor").value;
        const headerTextSize = document.getElementById("headerTextSize").value;
        const textSize = document.getElementById("textSize").value;
        const textAlignment = document.getElementById("textAlignment").value;

        const preview = document.getElementById("bannerPreview");
        const previewHeader = document.getElementById("previewHeader");
        const previewText = document.getElementById("previewText");
        const ctaButton = document.getElementById("ctaButton");

        //Set Banner size and background image
        preview.style.width = bannerSize[0] + "px";
        preview.style.height = bannerSize[1] + "px";
        preview.style.backgroundImage = `url(${imageUrl})`;
        //Set text alignment for entire banner
        previewText.style.textAlign = textAlignment;

        previewHeader.textContent = bannerHeaderText;
        previewHeader.style.color = textColor;
        previewHeader.style.fontSize = headerTextSize;
        previewHeader.style.textAlign = textAlignment;
        previewText.textContent = bannerText;
        previewText.style.color = textColor;
        previewText.style.fontSize = textSize;
      }

      function exportHTML() {
        const bannerHTML = document.getElementById("bannerPreview").outerHTML;

        // Add basic HTML structure with styles
        const fullHTML = `
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Exported Banner</title>
      <style>
        .banner-preview {
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          justify-content: center;
          background-size: cover;
          background-position: center;
          padding: 20px;
        }
      </style>
    </head>
    <body>
      ${bannerHTML}
    </body>
    </html>
  `;

        const blob = new Blob([bannerHTML], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "banner.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    </script>
  </body>
</html>
